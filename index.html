<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>认知污染 | COGNITIVE POLLUTION</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#050505;
    color:#ddd;
    font-family:"Microsoft YaHei",sans-serif;
}


/* 背景 */

.bg{
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at center,
    #252c3a 0%,
    #090909 45%,
    #000 100%);
}


/* 扫描线 */

.scan{
    position:fixed;
    inset:0;
    background:
    linear-gradient(
    rgba(255,255,255,.03) 1px,
    transparent 1px);
    background-size:100% 5px;
    pointer-events:none;
}


/* 粒子 */

.dot{
    position:absolute;
    width:3px;
    height:3px;
    background:#8b1e2d;
    border-radius:50%;
    animation:float 8s infinite;
}


@keyframes float{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    50%{
        opacity:1;
    }

    to{
        transform:translateY(-20vh);
        opacity:0;
    }

}



/* 主页面 */

.container{

    position:relative;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

}



.panel{

    width:1000px;

    padding:70px;

    background:
    rgba(0,0,0,.75);

    border:1px solid #333;

    box-shadow:
    0 0 50px #000;

}



.small{

    color:#777;

    letter-spacing:8px;

    font-size:14px;

}



h1{

    margin:30px 0;

    font-size:70px;

    letter-spacing:20px;

    animation:glitch 3s infinite;

}



@keyframes glitch{


    90%{
        transform:none;
    }


    92%{

        transform:translateX(5px);

        color:#a33;

    }


    95%{

        transform:translateX(-5px);

        color:#4af;

    }

}



.text{

    line-height:2;

    color:#aaa;

}



button{


    margin-top:40px;

    padding:15px 70px;

    background:none;

    border:

    1px solid #8b1e2d;


    color:white;

    letter-spacing:8px;

    cursor:pointer;


}


button:hover{


    background:#8b1e2d;

    box-shadow:
    0 0 30px #8b1e2d;

}



.menu{


    margin-top:50px;

    display:grid;

    grid-template-columns:
    repeat(3,1fr);

    gap:20px;

}



.card{


    padding:25px;

    border-left:
    2px solid #8b1e2d;

    background:#111;

    transition:.3s;

}



.card:hover{

    transform:translateY(-10px);

    background:#181818;

}



.title{

    color:#888;

    font-size:12px;

    letter-spacing:3px;

}



</style>

</head>


<body>


<div class="bg"></div>

<div class="scan"></div>



<div class="container">


<div class="panel">


<div class="small">
UNKNOWN PROJECT
</div>



<h1>
认知污染
</h1>



<div class="text">

COGNITIVE POLLUTION

<br><br>

所有答案，

都隐藏在错误的认知之中。

<br><br>

PROJECT FILE : 001

<br>

STATUS : UNKNOWN


</div>




<button>

ENTER SYSTEM

</button>




<div class="menu">


<div class="card">

<div class="title">
CHARACTER FILE
</div>

<br>

真真

<br>

SUBJECT 001

</div>



<div class="card">

<div class="title">
CHAPTER
</div>

<br>

01 错误的早餐

<br>

02 不存在的人

</div>



<div class="card">

<div class="title">
DATABASE
</div>

<br>

实验记录

<br>

恢复中...

</div>



</div>


</div>


</div>




<script>


for(let i=0;i<60;i++){

let d=document.createElement("div");

d.className="dot";

d.style.left=
Math.random()*100+"%";


d.style.animationDelay=
Math.random()*8+"s";


document.body.appendChild(d);

}


</script>


</body>

</html>
