<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>认知污染 | COGNITIVE POLLUTION</title>

  <style>
    :root {
      --red: #a01f3a;
      --red-bright: #d23a59;
      --white: #f2f3f7;
      --gray: #a7a9b2;
      --dark: #030409;
      --panel: rgba(4, 5, 11, 0.78);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: var(--dark);
      color: var(--white);
      font-family:
        "Microsoft YaHei",
        "Noto Sans SC",
        Arial,
        sans-serif;
    }

    button {
      font: inherit;
    }

    /* 原始图片直接加载，不会修改或重新压缩 GitHub 中的 hero.png */
    .hero-image {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      user-select: none;
      pointer-events: none;
      animation: imageEntrance 2.2s ease-out both;
    }

    @keyframes imageEntrance {
      from {
        opacity: 0;
        transform: scale(1.035);
        filter: brightness(0.45);
      }

      to {
        opacity: 1;
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .dark-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          rgba(1, 2, 7, 0.96) 0%,
          rgba(1, 2, 7, 0.78) 25%,
          rgba(1, 2, 7, 0.27) 55%,
          rgba(1, 2, 7, 0.16) 76%,
          rgba(1, 2, 7, 0.42) 100%
        ),
        linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.78) 0%,
          transparent 45%,
          rgba(0, 0, 0, 0.32) 100%
        );
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      box-shadow:
        inset 0 0 180px 45px rgba(0, 0, 0, 0.86);
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 7;
      opacity: 0.22;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 3px,
        rgba(255, 255, 255, 0.025) 4px
      );
    }

    .noise {
      position: fixed;
      inset: -50%;
      z-index: 3;
      opacity: 0.035;
      pointer-events: none;
      background-image:
        radial-gradient(#fff 0.6px, transparent 0.6px);
      background-size: 5px 5px;
      animation: noiseMove 0.25s steps(2) infinite;
    }

    @keyframes noiseMove {
      0% {
        transform: translate(0, 0);
      }

      25% {
        transform: translate(1%, -1%);
      }

      50% {
        transform: translate(-1%, 1%);
      }

      75% {
        transform: translate(1%, 1%);
      }

      100% {
        transform: translate(0, 0);
      }
    }

    .red-line {
      position: fixed;
      left: 0;
      top: 72%;
      z-index: 4;
      width: 100%;
      height: 1px;
      pointer-events: none;
      opacity: 0.45;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--red) 15%,
        var(--red-bright) 34%,
        transparent 70%
      );
    }

    .interface {
      position: relative;
      z-index: 5;
      width: 100%;
      height: 100vh;
      padding: 6vh 5vw 5vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards;
    }

    .system-code {
      font-size: 11px;
      letter-spacing: 0.38em;
      color: rgba(255, 255, 255, 0.52);
    }

    .system-state {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: rgba(255, 255, 255, 0.56);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red-bright);
      box-shadow: 0 0 14px var(--red-bright);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.35;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .main-content {
      width: min(720px, 80vw);
      margin-top: auto;
      margin-bottom: 8vh;
      opacity: 0;
      animation: fadeUp 1.2s 0.75s forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .english-title {
      margin-bottom: 16px;
      font-size: clamp(11px, 1.1vw, 17px);
      letter-spacing: 0.66em;
      color: rgba(255, 255, 255, 0.66);
    }

    .title {
      position: relative;
      display: inline-block;
      font-size: clamp(58px, 8vw, 120px);
      line-height: 1;
      letter-spacing: 0.13em;
      white-space: nowrap;
      font-weight: 700;
      text-shadow:
        3px 0 rgba(180, 19, 49, 0.45),
        -3px 0 rgba(44, 83, 129, 0.35),
        0 0 26px rgba(255, 255, 255, 0.13);
      animation: titleGlitch 5.4s infinite;
    }

    .title::after {
      content: "认知污染";
      position: absolute;
      inset: 0;
      z-index: -1;
      color: rgba(197, 28, 59, 0.28);
      transform: translateX(5px);
      clip-path: inset(58% 0 19% 0);
    }

    @keyframes titleGlitch {
      0%,
      87%,
      92%,
      100% {
        transform: translate(0);
        filter: none;
      }

      88% {
        transform: translate(4px, -1px);
        filter: contrast(1.4);
      }

      89% {
        transform: translate(-5px, 1px);
      }

      90% {
        transform: translate(2px, 0);
      }

      91% {
        transform: translate(-1px, 0);
      }
    }

    .quote {
      max-width: 570px;
      margin-top: 30px;
      padding: 2px 0 2px 18px;
      border-left: 2px solid rgba(172, 29, 57, 0.9);
      color: rgba(255, 255, 255, 0.76);
      font-size: clamp(13px, 1.15vw, 17px);
      line-height: 2;
      letter-spacing: 0.15em;
    }

    .enter-button {
      position: relative;
      width: 250px;
      height: 54px;
      margin-top: 38px;
      overflow: hidden;
      border: 1px solid rgba(190, 38, 66, 0.9);
      background: rgba(3, 4, 9, 0.48);
      color: white;
      cursor: pointer;
      letter-spacing: 0.35em;
      transition:
        border-color 0.25s,
        box-shadow 0.25s,
        transform 0.25s;
    }

    .enter-button::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: rgba(139, 21, 45, 0.9);
      transform: translateX(-102%);
      transition: transform 0.3s ease;
    }

    .enter-button:hover::before {
      transform: translateX(0);
    }

    .enter-button:hover {
      transform: translateY(-2px);
      border-color: var(--red-bright);
      box-shadow:
        0 0 30px rgba(170, 29, 56, 0.45),
        inset 0 0 20px rgba(255, 255, 255, 0.04);
    }

    .bottom-info {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
      opacity: 0;
      animation: fadeUp 1s 1s forwards;
    }

    .info-item {
      color: rgba(255, 255, 255, 0.48);
      font-size: 10px;
      letter-spacing: 0.23em;
    }

    .info-item strong {
      display: block;
      margin-top: 7px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      font-weight: normal;
      letter-spacing: 0.18em;
    }

    /* 点击 ENTER 后出现的主菜单 */
    .database {
      position: fixed;
      inset: 0;
      z-index: 8;
      padding: 7vh 6vw;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 40px;
      visibility: hidden;
      opacity: 0;
      background: rgba(2, 3, 8, 0.88);
      backdrop-filter: blur(13px);
      transition:
        opacity 0.45s ease,
        visibility 0.45s;
    }

    .database.open {
      visibility: visible;
      opacity: 1;
    }

    .database-sidebar {
      padding-right: 25px;
      border-right: 1px solid rgba(255, 255, 255, 0.14);
    }

    .database-label {
      margin-bottom: 35px;
      color: rgba(255, 255, 255, 0.43);
      font-size: 10px;
      letter-spacing: 0.4em;
    }

    .menu-button {
      width: 100%;
      padding: 17px 14px;
      border: 0;
      border-left: 2px solid transparent;
      background: transparent;
      color: rgba(255, 255, 255, 0.58);
      text-align: left;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: 0.25s;
    }

    .menu-button:hover,
    .menu-button.active {
      border-left-color: var(--red-bright);
      background: linear-gradient(
        90deg,
        rgba(150, 23, 49, 0.22),
        transparent
      );
      color: white;
      padding-left: 22px;
    }

    .database-content {
      position: relative;
      overflow: auto;
      padding: 3vh 2vw;
    }

    .database-content h2 {
      margin-bottom: 28px;
      font-size: clamp(30px, 4vw, 56px);
      letter-spacing: 0.16em;
      font-weight: normal;
    }

    .database-content p {
      max-width: 680px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 2.1;
      letter-spacing: 0.1em;
    }

    .file-card {
      max-width: 720px;
      margin-top: 30px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-left: 2px solid var(--red);
      background: rgba(255, 255, 255, 0.025);
    }

    .file-card small {
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.25em;
    }

    .file-card h3 {
      margin: 12px 0;
      letter-spacing: 0.15em;
      font-weight: normal;
    }

    .close-button {
      position: absolute;
      top: 0;
      right: 0;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 20px;
    }

    .close-button:hover {
      border-color: var(--red-bright);
      color: var(--red-bright);
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .hero-image {
        object-position: 55% center;
      }

      .dark-overlay {
        background:
          linear-gradient(
            0deg,
            rgba(1, 2, 7, 0.96) 0%,
            rgba(1, 2, 7, 0.72) 42%,
            rgba(1, 2, 7, 0.2) 100%
          );
      }

      .interface {
        min-height: 100svh;
        padding: 7vh 7vw 5vh;
      }

      .system-code {
        max-width: 70%;
        line-height: 1.8;
      }

      .main-content {
        width: 100%;
        margin-bottom: 6vh;
      }

      .title {
        font-size: clamp(44px, 14vw, 75px);
        letter-spacing: 0.08em;
      }

      .quote {
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      .enter-button {
        width: 220px;
      }

      .bottom-info {
        gap: 18px;
      }

      .database {
        padding: 5vh 5vw;
        grid-template-columns: 1fr;
        gap: 20px;
        overflow: auto;
      }

      .database-sidebar {
        padding-right: 0;
        padding-bottom: 18px;
        border-right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      }

      .menu-button {
        display: inline-block;
        width: auto;
        margin-right: 6px;
        padding: 11px;
      }

      .menu-button:hover,
      .menu-button.active {
        padding-left: 11px;
      }
    }
  </style>
</head>

<body>

  <!-- 必须与 index.html 放在同一个仓库目录中 -->
  <img
    class="hero-image"
    src="hero.png"
    alt="认知污染主视觉"
  >

  <div class="dark-overlay"></div>
  <div class="vignette"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="red-line"></div>

  <main class="interface" id="homeInterface">

    <header class="top-bar">
      <div class="system-code">
        HONGLIN RESEARCH DATABASE // FILE 001
      </div>

      <div class="system-state">
        <span class="status-dot"></span>
        SYSTEM RECOVERING
      </div>
    </header>

    <section class="main-content">

      <div class="english-title">
        COGNITIVE POLLUTION
      </div>

      <h1 class="title">
        认知污染
      </h1>

      <div class="quote">
        所有人都确信自己记得真相。<br>
        可真相，从来没有存在过。
      </div>

      <button
        class="enter-button"
        type="button"
        onclick="openDatabase()"
      >
        ENTER SYSTEM
      </button>

    </section>

    <footer class="bottom-info">

      <div class="info-item">
        PROJECT
        <strong>COGNITIVE POLLUTION</strong>
      </div>

      <div class="info-item">
        STATUS
        <strong>RECOVERING</strong>
      </div>

      <div class="info-item">
        RECORD
        <strong>NO. 001</strong>
      </div>

    </footer>

  </main>

  <section class="database" id="database">

    <aside class="database-sidebar">

      <div class="database-label">
        PROJECT DATABASE
      </div>

      <button
        class="menu-button active"
        onclick="showSection('overview', this)"
      >
        00 / 项目档案
      </button>

      <button
        class="menu-button"
        onclick="showSection('characters', this)"
      >
        01 / 角色档案
      </button>

      <button
        class="menu-button"
        onclick="showSection('chapters', this)"
      >
        02 / 章节记录
      </button>

      <button
        class="menu-button"
        onclick="showSection('experiment', this)"
      >
        03 / 实验数据库
      </button>

    </aside>

    <div class="database-content">

      <button
        class="close-button"
        type="button"
        onclick="closeDatabase()"
        aria-label="关闭"
      >
        ×
      </button>

      <div id="sectionContent"></div>

    </div>

  </section>

  <script>
    const contents = {
      overview: `
        <h2>PROJECT FILE</h2>

        <p>
          项目代号：COGNITIVE POLLUTION<br>
          中文名称：认知污染<br>
          当前状态：部分实验记录恢复中。<br><br>

          当一个人的外貌、身份与存在痕迹，
          可以同时从人类认知和电子记录中被改写，
          那么人们所相信的“真实”，究竟还剩下多少？
        </p>

        <div class="file-card">
          <small>SECURITY LEVEL // UNKNOWN</small>
          <h3>认知改写实验</h3>
          <p>
            实验对象身份异常，死亡记录存在冲突。
            部分档案已遭人为覆盖。
          </p>
        </div>
      `,

      characters: `
        <h2>CHARACTER FILE</h2>

        <div class="file-card">
          <small>SUBJECT NO. 001</small>
          <h3>一号</h3>
          <p>
            认知改写能力持有者。
            官方记录显示其已在最后一次实验中死亡。
          </p>
        </div>

        <div class="file-card">
          <small>IDENTITY FILE</small>
          <h3>空空</h3>
          <p>
            鸿凛科技公司总裁之女。
            重返冕阳私立学院后，身份记录开始出现异常。
          </p>
        </div>

        <div class="file-card">
          <small>OBSERVATION FILE</small>
          <h3>王晞</h3>
          <p>
            对认知改写表现出异常抗性，
            是少数能够察觉违和之处的人。
          </p>
        </div>
      `,

      chapters: `
        <h2>CHAPTER SELECT</h2>

        <div class="file-card">
          <small>CHAPTER 01</small>
          <h3>错误的早餐</h3>
          <p>
            她记得空空从来不吃鸡蛋。
          </p>
        </div>

        <div class="file-card">
          <small>CHAPTER 02</small>
          <h3>不存在的人</h3>
          <p>
            所有人都认识她，却没有人真正记得她。
          </p>
        </div>

        <div class="file-card">
          <small>CHAPTER 03</small>
          <h3>镜子里的自己</h3>
          <p>
            镜子没有说谎。说谎的是整个世界。
          </p>
        </div>

        <div class="file-card">
          <small>CHAPTER 04</small>
          <h3>最后一次实验</h3>
          <p>
            死亡确认完成。实验对象已被销毁。
          </p>
        </div>
      `,

      experiment: `
        <h2>EXPERIMENT LOG</h2>

        <p>
          数据损坏率：67%<br>
          生物识别信息：不一致<br>
          监控记录：已被覆盖<br>
          实验对象状态：无法确认
        </p>

        <div class="file-card">
          <small>WARNING</small>
          <h3>不要相信你所记得的一切</h3>
          <p>
            认知污染可能已经发生。
          </p>
        </div>
      `
    };

    const sectionContent =
      document.getElementById("sectionContent");

    sectionContent.innerHTML = contents.overview;

    function openDatabase() {
      document
        .getElementById("database")
        .classList.add("open");
    }

    function closeDatabase() {
      document
        .getElementById("database")
        .classList.remove("open");
    }

    function showSection(name, button) {
      sectionContent.innerHTML = contents[name];

      document
        .querySelectorAll(".menu-button")
        .forEach(item => item.classList.remove("active"));

      button.classList.add("active");
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeDatabase();
      }
    });
  </script>

</body>
</html>
